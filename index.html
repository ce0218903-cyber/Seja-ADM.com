<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ST | Diário Braw Stars</title>
<style>
body{
  background: linear-gradient(#003d1f,#000);
  color:white;
  font-family: Arial, sans-serif;
  text-align:center;
  margin:0;
}

.logo{
  margin-top:40px;
}

h1{
  color:#00ff88;
}

.card{
  background:#111;
  border:2px solid #00ff88;
  border-radius:20px;
  padding:20px;
  margin:20px;
}

input{
  width:90%;
  padding:15px;
  margin:10px 0;
  border:none;
  border-radius:15px;
  background:#000;
  color:white;
}

button{
  background:#00ff88;
  color:black;
  border:none;
  padding:15px 30px;
  border-radius:20px;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="logo">
  <h1>ST | Diário Braw Stars ⭐</h1>
  <p>Faça sua inscrição para ser ADM.</p>
</div>

<div class="card">
  <h2>Seus Dados</h2>
  <input type="text" placeholder="Seu nome ou nick">
  <input type="text" placeholder="Seu WhatsApp">
  <input type="number" placeholder="Sua idade">
  <br><br>
  <button>Enviar</button>
</div>

</body>
</html>
